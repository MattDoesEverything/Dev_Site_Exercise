<!DOCTYPE html>
<html>

  <head>
    
    <title>Page Title</title>
  
    <!-- Meta Tag Lines -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <div id="Header">
      <div id="HeaderLeft">
        <h1>Chronicles of the World</h1>  
      </div>

      <nav>
        <div id="PageMenu">
          <ul>
           <li>
             <label for="pages">Pages</label>

             <select name="pages" id="pages">
               <option value="about">About</option>
               <option value="socials">Socials</option>
           </li>
         </ul>
        </div>
      </nav>
      
    </div>
    
  </head>
  
  <body>
    <h1>This is a Heading</h1>
    <p>This is a paragraph.</p>
  </body>
  
  <style>
    header {
      overflow: hidden;
    }
    
    #Header {
      
      text-align: center;
      height: 60px;
    }
    
    #HeaderLeft {
      float: left;
      padding: none;
      margin: none;
      height: 60px;
      width: 30%;
    }
    
    #HeaderRight {
      text-align: right;
    }

    #PageMenu{
        float: right;
        width: 70%;
        height: 100%;
        margin: none;
    }
        
    #PageMenu ul{
        text-align: center;
        float: right;
        margin: none;
        background: #0074D9;
    }
        
    #PageMenu li{
        display: inline-block;
        padding: none;
        margin: none;
    }
        
    #PageMenu li a, #PageMenu li span{
        display: inline-block;
        padding: 0em 1.5em;
        text-decoration: none;
        font-weight: 600;
        text-transform: uppercase;
        line-height: 60px;
    }
        
    #PageMenu li a{
            
        color: #FFF;
    }
        
    #PageMenu li:hover a, #PageMenu li span{
        background: #FFF;
        color: #0074D9;
        border-left: 1px solid #0074D9;
        text-decoration: none;
    }
  </style>
</html>
